name: Daily Exchange Rate Collection

on:
  schedule:
    # 매일 00:05 KST (전날 15:05 UTC)
    - cron: "5 15 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Collect USD/EUR/CNY exchange rates (Naver Finance)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run collect:exchange-rate
